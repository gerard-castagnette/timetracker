<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --border: #e0e0e0;
    --accent: #6264a7;
    --accent-light: #ebebf5;
    --accent-dark: #4f52a0;
    --green: #13a10e;
    --red: #c50f1f;
    --red-light: #fde8ea;
    --text: #242424;
    --text-muted: #616161;
    --text-dim: #a0a0a0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
    --radius: 8px;
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    background: var(--accent); color: white;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-month { font-size: 13px; opacity: 0.85; }

  .main-layout { display: flex; flex: 1; }

  /* LEFT COL */
  .col-timer {
    width: 280px; min-width: 280px;
    background: var(--accent);
    padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
    color: white;
  }
  .active-card {
    background: rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .active-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; margin-bottom: 4px; }
  .active-name { font-size: 15px; font-weight: 600; margin-bottom: 14px; min-height: 22px; }
  .active-name.empty { opacity: 0.45; font-weight: 400; font-style: italic; }
  .timer-display {
    font-size: 40px; font-weight: 300; letter-spacing: -1px;
    font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 14px;
  }
  .timer-display.paused { opacity: 0.45; }
  .active-status { display: flex; align-items: center; gap: 7px; font-size: 12px; opacity: 0.8; }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4fc3f7; box-shadow: 0 0 6px #4fc3f7;
    animation: pulse 1.5s ease-in-out infinite; flex-shrink: 0;
  }
  .pulse-dot.paused { background: rgba(255,255,255,0.4); box-shadow: none; animation: none; }
  .pulse-dot.idle { display: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  .timer-controls { display: flex; flex-direction: column; gap: 8px; }
  .btn-timer {
    width: 100%; padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: white; font-size: 13px; font-family: var(--sans); font-weight: 500;
    cursor: pointer; transition: background 0.15s;
    text-align: left; display: flex; align-items: center; gap: 8px;
  }
  .btn-timer:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
  .btn-timer:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-timer.highlighted { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.45); }
  .btn-timer.danger:hover:not(:disabled) { background: rgba(220,60,60,0.3); border-color: rgba(255,150,150,0.4); }

  /* RIGHT COL */
  .col-projects { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; pointer-events: none; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px 9px 36px;
    color: var(--text); font-size: 14px; font-family: var(--sans);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(98,100,167,0.2); }

  .projects-header { display: flex; align-items: center; justify-content: space-between; }
  .projects-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .add-project-btn {
    background: var(--accent-light); border: none;
    color: var(--accent); font-size: 13px; font-family: var(--sans); font-weight: 600;
    cursor: pointer; padding: 6px 12px; border-radius: var(--radius); transition: background 0.15s;
  }
  .add-project-btn:hover { background: #d8d9ee; }

  .projects-list { display: flex; flex-direction: column; gap: 6px; }

  .project-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: all 0.15s;
    box-shadow: var(--shadow); position: relative;
  }
  .project-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .project-item.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 2px rgba(98,100,167,0.15); }
  .project-item.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
  }
  .drag-handle { color: var(--text-dim); font-size: 14px; cursor: grab; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; user-select: none; }
  .project-item:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .project-item.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .project-item.drag-over::after { content: ''; position: absolute; top: -3px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 2px; }
  .proj-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .proj-name-text { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-time { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .project-item.active .proj-time { color: var(--accent); font-weight: 600; }
  .proj-archive-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 11px; font-family: var(--sans);
    padding: 3px 6px; border-radius: 4px;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; flex-shrink: 0;
  }
  .project-item:hover .proj-archive-btn { opacity: 1; }
  .proj-archive-btn:hover { color: var(--red); background: var(--red-light); }
  .no-results { text-align: center; padding: 24px; color: var(--text-dim); font-size: 13px; }

  /* MOBILE */
  @media (max-width: 640px) {
    .main-layout { flex-direction: column; }
    .col-timer { width: 100%; min-width: unset; }
    .timer-display { font-size: 34px; }
    .timer-controls { flex-direction: row; flex-wrap: wrap; }
    .btn-timer { width: auto; flex: 1; min-width: 120px; }
    .col-projects { padding: 16px; }
  }

  /* MODALS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 12px; padding: 24px;
    width: 100%; max-width: 440px; box-shadow: var(--shadow-md);
    transform: translateY(8px); transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: var(--text); }
  .field-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; }
  .modal-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px;
    color: var(--text); font-size: 14px; font-family: var(--sans);
    outline: none; margin-bottom: 14px; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(98,100,167,0.2); }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-btn {
    flex: 1; padding: 8px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); font-size: 12px; font-family: var(--sans); font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .mode-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .time-row { display: flex; gap: 10px; }
  .time-row > div { flex: 1; }
  .modal-error { color: var(--red); font-size: 12px; margin-bottom: 8px; min-height: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
    padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-family: var(--sans);
    font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-confirm {
    background: var(--accent); border: none; color: white;
    padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-family: var(--sans);
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-confirm:hover { background: var(--accent-dark); }

  /* RECAP */
  .recap-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .recap-item:last-child { border-bottom: none; }
  .recap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .recap-name { flex: 1; font-size: 14px; color: var(--text); }
  .recap-bar-wrap { width: 60px; background: var(--surface2); border-radius: 3px; height: 4px; flex-shrink: 0; }
  .recap-bar { height: 4px; border-radius: 3px; background: var(--accent); }
  .recap-pct { font-size: 11px; color: var(--text-dim); min-width: 32px; text-align: right; }
  .recap-time { font-size: 13px; color: var(--accent); font-weight: 600; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
  .recap-total { font-size: 13px; color: var(--text-muted); text-align: right; padding-top: 12px; border-top: 1px solid var(--border); }
  .recap-total span { color: var(--text); font-weight: 600; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text); color: white;
    padding: 8px 18px; border-radius: 20px; font-size: 13px;
    opacity: 0; transition: all 0.25s; pointer-events: none;
    white-space: nowrap; z-index: 200; box-shadow: var(--shadow-md);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <div class="topbar-title">⏱ Time Tracker</div>
    <div class="topbar-month" id="monthLabel"></div>
  </div>
  <div class="main-layout">
    <!-- LEFT -->
    <div class="col-timer">
      <div class="active-card">
        <div class="active-label">En cours</div>
        <div class="active-name empty" id="activeName">Aucun projet actif</div>
        <div class="timer-display paused" id="timerDisplay">00:00:00</div>
        <div class="active-status">
          <div class="pulse-dot idle" id="pulseDot"></div>
          <span id="statusText">Sélectionne un projet</span>
        </div>
      </div>
      <div class="timer-controls">
        <button class="btn-timer highlighted" id="pauseBtn" onclick="togglePause()" disabled>⏸ Pause</button>
        <button class="btn-timer" onclick="openManualModal()">✏️ Saisie manuelle</button>
        <button class="btn-timer" onclick="openRecap()">📊 Récap du mois</button>
        <button class="btn-timer danger" onclick="stopAll()" id="stopBtn" disabled>⏹ Arrêter le chrono</button>
      </div>
    </div>
    <!-- RIGHT -->
    <div class="col-projects">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Rechercher un projet..." oninput="filterProjects()" autocomplete="off">
      </div>
      <div class="projects-header">
        <span class="projects-label">Projets</span>
        <button class="add-project-btn" onclick="openAddModal()">+ Nouveau projet</button>
      </div>
      <div class="projects-list" id="projectsList"></div>
    </div>
  </div>
</div>

<!-- Saisie manuelle -->
<div class="modal-overlay" id="manualModal">
  <div class="modal">
    <h2>Saisie manuelle</h2>
    <label class="field-label">Projet</label>
    <select class="modal-input" id="manualProject"></select>
    <label class="field-label">Date</label>
    <input class="modal-input" type="date" id="manualDate">
    <div class="mode-toggle">
      <button class="mode-btn" id="modeBtn1" onclick="setManualMode('range')">Début → Fin</button>
      <button class="mode-btn active" id="modeBtn2" onclick="setManualMode('duration')">Durée (minutes)</button>
    </div>
    <div id="manualRangeFields" style="display:none;">
      <div class="time-row">
        <div><label class="field-label">Début</label><input class="modal-input" type="time" id="manualStart"></div>
        <div><label class="field-label">Fin</label><input class="modal-input" type="time" id="manualEnd"></div>
      </div>
    </div>
    <div id="manualDurationFields">
      <label class="field-label">Durée (minutes)</label>
      <input class="modal-input" type="number" id="manualDuration" min="1" max="1440" placeholder="ex: 45">
    </div>
    <div class="modal-error" id="manualError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('manualModal')">Annuler</button>
      <button class="btn-confirm" onclick="confirmManual()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Nouveau projet -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Nouveau projet</h2>
    <label class="field-label">Nom</label>
    <input class="modal-input" id="newProjectName" placeholder="ex: Projet Alpha" maxlength="50" onkeydown="if(event.key==='Enter') confirmAdd()">
    <div class="modal-error" id="addModalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addModal')">Annuler</button>
      <button class="btn-confirm" onclick="confirmAdd()">Créer</button>
    </div>
  </div>
</div>

<!-- Récap -->
<div class="modal-overlay" id="recapModal">
  <div class="modal">
    <h2 id="recapTitle">Récap du mois</h2>
    <div id="recapList"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeModal('recapModal')">Fermer</button>
      <button class="btn-confirm" onclick="exportRecap()">Exporter CSV</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#6264a7','#13a10e','#ca5010','#c50f1f','#0078d4','#8764b8','#038387','#e3008c','#107c10','#986f0b'];
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let state = { projects:[], sessions:[], activeProjectId:null, activeStart:null, paused:false, pausedAt:null, pausedDuration:0 };
let timerInterval = null, manualMode = 'duration';

function save() { localStorage.setItem('tt_state', JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem('tt_state');
  if (raw) {
    try {
      const s = JSON.parse(raw);
      state = {...state, ...s};
      if (state.activeStart) state.activeStart = new Date(state.activeStart);
      if (state.pausedAt) state.pausedAt = new Date(state.pausedAt);
      state.sessions = (state.sessions||[]).map(s => ({...s, start:new Date(s.start), end:s.end?new Date(s.end):null}));
    } catch(e) {}
  }
  if (!state.projects || state.projects.length === 0) {
    state.projects = [{id:uid(), name:'Mon premier projet', color:COLORS[0]}];
    save();
  }
}

function uid() { return Math.random().toString(36).slice(2,10); }
function fmtHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${ph(h)}:${ph(m)}:${ph(sec)}`; }
function ph(n) { return String(n).padStart(2,'0'); }
function fmtHM(secs) {
  const h=Math.floor(secs/3600), m=Math.round((secs%3600)/60);
  if(h>0&&m>0) return `${h}h${ph(m)}`;
  if(h>0) return `${h}h`;
  if(m===0&&secs>0) return '< 1min';
  return `${m}min`;
}

function getElapsedSeconds() {
  if (!state.activeStart) return 0;
  const base = state.pausedDuration||0;
  if (state.paused) return base;
  return base + Math.floor((new Date()-state.activeStart)/1000);
}

function getProjectMonthSeconds(pid) {
  const now=new Date(), mo=now.getMonth(), yr=now.getFullYear();
  let t=0;
  for(const s of state.sessions) {
    if(s.projectId!==pid) continue;
    const d=new Date(s.start);
    if(d.getMonth()!==mo||d.getFullYear()!==yr) continue;
    t+=s.minutes*60;
  }
  if(state.activeProjectId===pid) t+=getElapsedSeconds();
  return t;
}

function switchProject(pid) {
  if(state.activeProjectId===pid) return;
  if(state.activeProjectId&&state.activeStart) {
    const e=getElapsedSeconds();
    state.sessions.push({projectId:state.activeProjectId, start:state.activeStart, end:new Date(), minutes:Math.round(e/60*100)/100});
  }
  state.activeProjectId=pid; state.activeStart=new Date(); state.paused=false; state.pausedAt=null; state.pausedDuration=0;
  save();
  const proj=state.projects.find(p=>p.id===pid);
  showToast(`▶ ${proj.name}`); render(); startTimer();
}

function stopAll() {
  if(!state.activeProjectId) return;
  const e=getElapsedSeconds();
  if(e>5) state.sessions.push({projectId:state.activeProjectId, start:state.activeStart, end:new Date(), minutes:Math.round(e/60*100)/100});
  state.activeProjectId=null; state.activeStart=null; state.paused=false; state.pausedDuration=0;
  clearInterval(timerInterval); save(); showToast('⏹ Arrêté'); render();
}

function togglePause() {
  if(!state.activeProjectId) return;
  if(!state.paused) {
    state.pausedDuration=getElapsedSeconds(); state.paused=true; state.pausedAt=new Date();
    clearInterval(timerInterval); showToast('⏸ Pause');
  } else {
    state.activeStart=new Date(); state.paused=false; state.pausedAt=null;
    startTimer(); showToast('▶ Reprise');
  }
  save(); render();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.getElementById('timerDisplay').textContent = fmtHMS(getElapsedSeconds());
    const at = document.querySelector('.project-item.active .proj-time');
    if(at) at.textContent = fmtHM(getProjectMonthSeconds(state.activeProjectId));
  }, 1000);
}

function render() {
  const now=new Date();
  document.getElementById('monthLabel').textContent = `${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  const nameEl=document.getElementById('activeName'), timerEl=document.getElementById('timerDisplay');
  const dot=document.getElementById('pulseDot'), status=document.getElementById('statusText');
  const pauseBtn=document.getElementById('pauseBtn'), stopBtn=document.getElementById('stopBtn');
  if(state.activeProjectId) {
    const proj=state.projects.find(p=>p.id===state.activeProjectId);
    nameEl.textContent=proj?proj.name:'—'; nameEl.className='active-name';
    timerEl.textContent=fmtHMS(getElapsedSeconds()); timerEl.className=state.paused?'timer-display paused':'timer-display';
    dot.className=state.paused?'pulse-dot paused':'pulse-dot';
    status.textContent=state.paused?'En pause':'En cours...';
    pauseBtn.textContent=state.paused?'▶ Reprendre':'⏸ Pause'; pauseBtn.disabled=false; stopBtn.disabled=false;
    if(!state.paused) startTimer();
  } else {
    nameEl.textContent='Aucun projet actif'; nameEl.className='active-name empty';
    timerEl.textContent='00:00:00'; timerEl.className='timer-display paused';
    dot.className='pulse-dot idle'; status.textContent='Sélectionne un projet';
    pauseBtn.textContent='⏸ Pause'; pauseBtn.disabled=true; stopBtn.disabled=true;
  }
  filterProjects();
}

function filterProjects() {
  const query=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  const list=document.getElementById('projectsList');
  list.innerHTML='';
  const filtered=state.projects.filter(p=>!p.archived&&(!query||p.name.toLowerCase().includes(query)));
  if(filtered.length===0) { list.innerHTML=`<div class="no-results">${query?'Aucun projet trouvé':'Aucun projet actif'}</div>`; return; }
  for(const proj of filtered) {
    const secs=getProjectMonthSeconds(proj.id), isActive=proj.id===state.activeProjectId;
    const div=document.createElement('div');
    div.className='project-item'+(isActive?' active':'');
    div.draggable=!query; div.dataset.id=proj.id;
    div.innerHTML=`
      ${!query?`<div class="drag-handle" title="Réordonner">⠿</div>`:''}
      <div class="proj-color" style="background:${proj.color}"></div>
      <div class="proj-name-text">${proj.name}</div>
      <div class="proj-time">${secs>0?fmtHM(secs):'—'}</div>
      <button class="proj-archive-btn" onclick="archiveProject('${proj.id}',event)">Archiver</button>
    `;
    div.onclick=e=>{ if(!e.target.closest('.drag-handle')&&!e.target.closest('.proj-archive-btn')) switchProject(proj.id); };
    div.addEventListener('dragstart',onDragStart); div.addEventListener('dragover',onDragOver);
    div.addEventListener('drop',onDrop); div.addEventListener('dragend',onDragEnd);
    list.appendChild(div);
  }
}

let dragSrcId=null;
function onDragStart(e) { dragSrcId=e.currentTarget.dataset.id; e.currentTarget.style.opacity='0.4'; e.dataTransfer.effectAllowed='move'; }
function onDragOver(e) { e.preventDefault(); document.querySelectorAll('.project-item').forEach(el=>el.classList.remove('drag-over')); e.currentTarget.classList.add('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const tid=e.currentTarget.dataset.id;
  if(!dragSrcId||dragSrcId===tid) return;
  const si=state.projects.findIndex(p=>p.id===dragSrcId), ti=state.projects.findIndex(p=>p.id===tid);
  if(si===-1||ti===-1) return;
  const [moved]=state.projects.splice(si,1); state.projects.splice(ti,0,moved);
  save(); filterProjects();
}
function onDragEnd(e) { e.currentTarget.style.opacity=''; document.querySelectorAll('.project-item').forEach(el=>el.classList.remove('drag-over')); }

function openAddModal() {
  document.getElementById('newProjectName').value=''; document.getElementById('addModalError').textContent='';
  document.getElementById('addModal').classList.add('show');
  setTimeout(()=>document.getElementById('newProjectName').focus(),100);
}
function confirmAdd() {
  const name=document.getElementById('newProjectName').value.trim();
  const errorEl=document.getElementById('addModalError');
  if(!name) return;
  const existing=state.projects.find(p=>p.name.toLowerCase()===name.toLowerCase()&&!p.archived);
  if(existing) { errorEl.textContent=`"${existing.name}" existe déjà.`; return; }
  const archived=state.projects.find(p=>p.name.toLowerCase()===name.toLowerCase()&&p.archived);
  if(archived) {
    const ts=getAllTimeSeconds(archived.id);
    if(confirm(ts>0?`"${archived.name}" est archivé (${fmtHM(ts)} enregistré). Restaurer ?`:`"${archived.name}" est archivé. Restaurer ?`)) {
      archived.archived=false; save(); closeModal('addModal'); showToast(`♻ "${archived.name}" restauré`); render(); return;
    }
  }
  const color=COLORS[state.projects.filter(p=>!p.archived).length%COLORS.length];
  state.projects.push({id:uid(),name,color}); save(); closeModal('addModal'); showToast(`✓ "${name}" ajouté`); render();
}

function getAllTimeSeconds(pid) { return state.sessions.filter(s=>s.projectId===pid).reduce((a,s)=>a+s.minutes*60,0); }

function archiveProject(id,e) {
  e.stopPropagation();
  const proj=state.projects.find(p=>p.id===id); if(!proj) return;
  const ts=getAllTimeSeconds(id), ti=ts>0?` (${fmtHM(ts)} enregistré)`:'';
  if(!confirm(`Archiver "${proj.name}"${ti} ?\n\nLe projet disparaîtra de la liste mais le temps restera dans le récap.`)) return;
  if(state.activeProjectId===id) stopAll();
  proj.archived=true; save(); showToast(`"${proj.name}" archivé`); render();
}

function openManualModal() {
  const sel=document.getElementById('manualProject');
  sel.innerHTML='';
  state.projects.filter(p=>!p.archived).forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p.id; opt.textContent=p.name;
    if(p.id===state.activeProjectId) opt.selected=true;
    sel.appendChild(opt);
  });
  const today=new Date();
  document.getElementById('manualDate').value=today.toISOString().slice(0,10);
  const hh=ph(today.getHours()), mm=ph(today.getMinutes());
  document.getElementById('manualStart').value=`${hh}:${mm}`;
  document.getElementById('manualEnd').value=`${hh}:${mm}`;
  document.getElementById('manualDuration').value='';
  document.getElementById('manualError').textContent='';
  setManualMode('duration');
  document.getElementById('manualModal').classList.add('show');
}

function setManualMode(mode) {
  manualMode=mode;
  document.getElementById('manualRangeFields').style.display=mode==='range'?'block':'none';
  document.getElementById('manualDurationFields').style.display=mode==='duration'?'block':'none';
  document.getElementById('modeBtn1').className='mode-btn'+(mode==='range'?' active':'');
  document.getElementById('modeBtn2').className='mode-btn'+(mode==='duration'?' active':'');
}

function confirmManual() {
  const errorEl=document.getElementById('manualError');
  const pid=document.getElementById('manualProject').value, dateVal=document.getElementById('manualDate').value;
  errorEl.textContent='';
  if(!pid) { errorEl.textContent='Choisis un projet.'; return; }
  if(!dateVal) { errorEl.textContent='Choisis une date.'; return; }
  let minutes=0, startDate, endDate;
  if(manualMode==='range') {
    const sv=document.getElementById('manualStart').value, ev=document.getElementById('manualEnd').value;
    if(!sv||!ev) { errorEl.textContent='Renseigne début et fin.'; return; }
    startDate=new Date(`${dateVal}T${sv}`); endDate=new Date(`${dateVal}T${ev}`);
    if(endDate<=startDate) { errorEl.textContent='La fin doit être après le début.'; return; }
    minutes=(endDate-startDate)/60000;
  } else {
    const dur=parseInt(document.getElementById('manualDuration').value);
    if(!dur||dur<1) { errorEl.textContent='Durée invalide.'; return; }
    startDate=new Date(`${dateVal}T09:00`); endDate=new Date(startDate.getTime()+dur*60000); minutes=dur;
  }
  state.sessions.push({projectId:pid, start:startDate, end:endDate, minutes:Math.round(minutes*100)/100, manual:true});
  save(); closeModal('manualModal');
  const proj=state.projects.find(p=>p.id===pid);
  showToast(`✓ ${fmtHM(minutes*60)} ajouté à "${proj.name}"`); render();
}

function openRecap() {
  const now=new Date(), mo=now.getMonth(), yr=now.getFullYear();
  document.getElementById('recapTitle').textContent=`Récap — ${MONTHS[mo]} ${yr}`;
  const totals={};
  for(const s of state.sessions) {
    const d=new Date(s.start); if(d.getMonth()!==mo||d.getFullYear()!==yr) continue;
    totals[s.projectId]=(totals[s.projectId]||0)+s.minutes*60;
  }
  if(state.activeProjectId) totals[state.activeProjectId]=(totals[state.activeProjectId]||0)+getElapsedSeconds();
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  const sorted=state.projects.map(p=>({...p,secs:totals[p.id]||0})).filter(p=>p.secs>0).sort((a,b)=>b.secs-a.secs);
  const listEl=document.getElementById('recapList');
  if(sorted.length===0) { listEl.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:13px;">Aucune session ce mois-ci</div>`; }
  else {
    listEl.innerHTML=sorted.map(p=>{
      const pct=grand>0?Math.round(p.secs/grand*100):0;
      const badge=p.archived?`<span style="font-size:10px;color:var(--text-dim);margin-left:4px;">(archivé)</span>`:'';
      return `<div class="recap-item">
        <div class="recap-dot" style="background:${p.color};opacity:${p.archived?0.5:1}"></div>
        <div class="recap-name">${p.name}${badge}</div>
        <div class="recap-bar-wrap"><div class="recap-bar" style="width:${pct}%"></div></div>
        <div class="recap-pct">${pct}%</div>
        <div class="recap-time">${fmtHM(p.secs)}</div>
      </div>`;
    }).join('')+`<div class="recap-total">Total : <span>${fmtHM(grand)}</span></div>`;
  }
  document.getElementById('recapModal').classList.add('show');
}

function exportRecap() {
  const now=new Date(), mo=now.getMonth(), yr=now.getFullYear();
  let csv='Projet,Durée,Durée (minutes)\n';
  for(const proj of state.projects) {
    const secs=getProjectMonthSeconds(proj.id); if(secs===0) continue;
    csv+=`"${proj.name}","${fmtHM(secs)}",${Math.round(secs/60)}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`timetracker_${MONTHS[mo].toLowerCase()}_${yr}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timeout); t._timeout=setTimeout(()=>t.classList.remove('show'),2000);
}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');}));

load(); render();
if(state.activeProjectId&&!state.paused) startTimer();
</script>
</body>
</html>
